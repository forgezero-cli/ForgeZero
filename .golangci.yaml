run:
  issues-exit-code: 1

linters:
  disable-all: true
  enable:
    - govet
    - staticcheck
    - typecheck
    - ineffassign
    - unused
    - errcheck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    - linters:
        - unused
      text: ".*"
    - linters:
        - errcheck
      text: ".*"
    - linters:
        - staticcheck
      text: "SA9003:"

