jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install Build Tools (The Gloria Arsenal)
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm fasm gcc clang zig

      - name: Test with Race Detector
        run: go test -race -v ./...

