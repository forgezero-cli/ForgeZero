name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-release:
    name: Build Release
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Build multiplatform release
        run: bash release.sh
        shell: bash

      - name: Create release notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          git log --oneline ${VERSION}^..${VERSION} > RELEASE_NOTES.txt || true
          echo "Release: $VERSION" >> RELEASE_NOTES.txt
        shell: bash

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "release/*"
          bodyFile: "RELEASE_NOTES.txt"
          draft: false
          prerelease: false

      - name: Upload to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.ref_name }}
          path: release/
