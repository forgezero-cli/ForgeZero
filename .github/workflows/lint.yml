name: Lint & Quality

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: Go Lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --timeout=10m --skip-files='.*test\.go' ./...

  fmt:
    name: Go Format
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Check gofmt
        run: |
          set -e
          FMT_FILES=$(gofmt -l ./...)
          if [ -n "$FMT_FILES" ]; then
            echo "❌ Files need formatting:"
            echo "$FMT_FILES"
            exit 1
          fi
          echo "✓ All files properly formatted"
        shell: bash

  vet:
    name: Go Vet
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Run go vet
        run: go vet ./...

  security:
    name: Security Scan
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: '-no-fail -tests ./...'

  deps:
    name: Dependency Check
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Check for vulnerable dependencies
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        shell: bash

  complexity:
    name: Code Complexity
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Install gocyclo
        run: go install github.com/fzipp/gocyclo/cmd/gocyclo@latest

      - name: Check cyclomatic complexity
        run: |
          gocyclo -over 15 ./cmd ./internal | tee complexity.txt
          if grep -q .; then
            echo "⚠ Some functions exceed complexity threshold"
          else
            echo "✓ All functions within complexity limits"
          fi
        shell: bash
