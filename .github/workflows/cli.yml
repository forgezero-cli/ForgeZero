name: ForgeZero CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61
          args: --timeout=5m --verbose

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go-version: ['1.23', '1.24', '1.25']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Install tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm fasm gcc clang
          wget -q https://ziglang.org/builds/zig-linux-x86_64-0.14.0-dev.3872+ef1b28667.tar.xz
          sudo tar -xf zig-linux-x86_64-*.tar.xz -C /usr/local
          sudo mv /usr/local/zig-linux-x86_64-* /usr/local/zig
          sudo ln -s /usr/local/zig/zig /usr/local/bin/zig
      - name: Install tools (macOS)
        if: runner.os == 'macOS'
        run: brew install nasm gcc zig
      - name: Install tools (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nasm fasm zig --confirm
          echo "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Run tests
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            go test -v -coverprofile=coverage.out ./...
          else
            go test -race -v -coverprofile=coverage.out ./...
          fi
        shell: bash
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Cross-compile
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BIN_NAME="fz"
          if [ "$GOOS" = "windows" ]; then
            BIN_NAME="fz.exe"
          fi
          go build -ldflags="-s -w" -o $BIN_NAME ./cmd/fz
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fz-${{ matrix.goos }}-${{ matrix.goarch }}
          path: fz*

  docker:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
