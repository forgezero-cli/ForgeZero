name: ForgeZero CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm fasm clang gcc

      - name: Run tests
        run: |
          go test -race -v ./...

  build:
    needs: test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64

          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BIN=fz

          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o "$BIN" \
            ./cmd/fz

      - uses: actions/upload-artifact@v4
        with:
          name: fz-${{ matrix.goos }}-${{ matrix.goarch }}
          path: fz

