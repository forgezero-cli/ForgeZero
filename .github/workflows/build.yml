name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Run verbose unit tests
        run: |
          go test -v $(go list ./... | grep -v fz/internal/musl)

      - name: Run race detector tests
        run: |
          go test -race $(go list ./... | grep -v fz/internal/musl)

      - name: Run coverage tests
        run: |
          go test -cover $(go list ./... | grep -v fz/internal/musl)

      - name: Build binary
        run: |
          go build -v -o fz ./cmd/fz
