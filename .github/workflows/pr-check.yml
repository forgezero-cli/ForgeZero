name: CI Quick Check

on:
  pull_request:
    branches: [ main, master ]

jobs:
  quick-test:
    name: Quick PR Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Run tests
        run: go test -timeout 5m ./...

      - name: Build for current platform
        run: go build -o /tmp/fz-check ./cmd/fz

      - name: Quick smoke test
        run: /tmp/fz-check --version
